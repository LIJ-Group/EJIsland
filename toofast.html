<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>请稍候 - 异界之岛</title>
    <link rel="icon" href="./public/images/favicon.png" type="image/png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(180deg, #1a0f0a 0%, #0d0705 50%, #1a0f0a 100%);
            font-family: 'Microsoft YaHei', 'Segoe UI', sans-serif;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(212, 175, 55, 0.6);
            border-radius: 50%;
            animation: float-particle 8s infinite ease-in-out;
        }
        .particle:nth-child(1) { left: 10%; animation-delay: 0s; animation-duration: 8s; }
        .particle:nth-child(2) { left: 20%; animation-delay: 1s; animation-duration: 10s; }
        .particle:nth-child(3) { left: 30%; animation-delay: 2s; animation-duration: 7s; }
        .particle:nth-child(4) { left: 40%; animation-delay: 3s; animation-duration: 9s; }
        .particle:nth-child(5) { left: 50%; animation-delay: 4s; animation-duration: 11s; }
        .particle:nth-child(6) { left: 60%; animation-delay: 2s; animation-duration: 8s; }
        .particle:nth-child(7) { left: 70%; animation-delay: 5s; animation-duration: 10s; }
        .particle:nth-child(8) { left: 80%; animation-delay: 1s; animation-duration: 9s; }
        .particle:nth-child(9) { left: 90%; animation-delay: 3s; animation-duration: 7s; }
        
        @keyframes float-particle {
            0%, 100% { 
                transform: translateY(100vh) scale(0); 
                opacity: 0;
            }
            10% { 
                opacity: 0.8;
                transform: translateY(90vh) scale(1);
            }
            90% { 
                opacity: 0.6;
                transform: translateY(10vh) scale(0.8);
            }
            100% { 
                transform: translateY(0) scale(0); 
                opacity: 0;
            }
        }
        .glow-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(60px);
            pointer-events: none;
            animation: pulse-glow 4s infinite ease-in-out;
        }
        .glow-orb-1 {
            width: 300px;
            height: 300px;
            background: rgba(212, 175, 55, 0.08);
            top: 10%;
            left: 10%;
            animation-delay: 0s;
        }
        .glow-orb-2 {
            width: 250px;
            height: 250px;
            background: rgba(139, 69, 19, 0.1);
            bottom: 20%;
            right: 15%;
            animation-delay: 2s;
        }
        @keyframes pulse-glow {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 0.8; }
        }
        .container {
            text-align: center;
            max-width: 400px;
            padding: 48px 36px;
            background: linear-gradient(180deg, rgba(255, 253, 245, 0.06) 0%, rgba(255, 250, 238, 0.03) 100%);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 28px;
            border: 1px solid rgba(212, 175, 55, 0.15);
            box-shadow: 
                0 30px 60px rgba(0, 0, 0, 0.5),
                0 0 100px rgba(212, 175, 55, 0.03),
                inset 0 1px 0 rgba(255, 255, 255, 0.08);
            position: relative;
            z-index: 10;
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes fadeInUp {
            from { 
                opacity: 0; 
                transform: translateY(30px) scale(0.95);
            }
            to { 
                opacity: 1; 
                transform: translateY(0) scale(1);
            }
        }
        .icon-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 20px;
        }
        .icon {
            font-size: 56px;
            display: inline-block;
            animation: float-sand 3s ease-in-out infinite;
        }
        @keyframes float-sand {
            0%, 100% { transform: translateY(0) rotate(-5deg); }
            50% { transform: translateY(-12px) rotate(5deg); }
        }
        .icon-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.3) 0%, transparent 70%);
            border-radius: 50%;
            animation: icon-pulse 2s infinite ease-in-out;
        }
        @keyframes icon-pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
            50% { transform: translate(-50%, -50%) scale(1.3); opacity: 0.8; }
        }
        h1 {
            background: linear-gradient(180deg, #f5d87a 0%, #d4af37 50%, #b8962e 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 24px;
            margin-bottom: 14px;
            font-weight: 600;
            letter-spacing: 4px;
        }
        p {
            color: rgba(255, 253, 245, 0.6);
            font-size: 14px;
            line-height: 1.8;
            margin-bottom: 28px;
        }
        .timer-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        .progress-ring {
            position: relative;
            width: 120px;
            height: 120px;
        }
        .progress-ring svg {
            transform: rotate(-90deg);
            width: 120px;
            height: 120px;
        }
        .progress-ring circle {
            fill: none;
            stroke-width: 4;
        }
        .progress-ring .bg {
            stroke: rgba(212, 175, 55, 0.15);
        }
        .progress-ring .progress {
            stroke: url(#goldGradient);
            stroke-linecap: round;
            stroke-dasharray: 314;
            stroke-dashoffset: 0;
            transition: stroke-dashoffset 1s linear;
            filter: drop-shadow(0 0 6px rgba(255, 215, 0, 0.5));
        }
        .timer-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 18px;
            font-weight: 600;
            background: linear-gradient(180deg, #ffeaa7 0%, #ffd700 50%, #f9a825 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
        }
        .timer-label {
            color: rgba(212, 175, 55, 0.7);
            font-size: 12px;
            letter-spacing: 4px;
            text-transform: uppercase;
        }
        .footer {
            color: rgba(255, 253, 245, 0.3);
            font-size: 11px;
            margin-top: 24px;
            padding-top: 18px;
            border-top: 1px solid rgba(212, 175, 55, 0.08);
            letter-spacing: 2px;
        }
        .footer span {
            color: rgba(212, 175, 55, 0.5);
            font-weight: 500;
        }
        .hint {
            color: rgba(255, 253, 245, 0.35);
            font-size: 11px;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>
    <div class="glow-orb glow-orb-1"></div>
    <div class="glow-orb glow-orb-2"></div>
    
    <div class="container">
        <div class="icon-wrapper">
            <div class="icon-glow"></div>
            <div class="icon">⏳</div>
        </div>
        <h1>旅者，请稍候</h1>
        <p>访问间隔过短，请在此地休息片刻<br>让时间的流沙稍作停歇</p>
        
        <div class="timer-container">
            <div class="progress-ring">
                <svg>
                    <defs>
                        <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#ffeaa7"/>
                            <stop offset="50%" style="stop-color:#ffd700"/>
                            <stop offset="100%" style="stop-color:#f9a825"/>
                        </linearGradient>
                    </defs>
                    <circle class="bg" cx="60" cy="60" r="50"/>
                    <circle class="progress" id="progressCircle" cx="60" cy="60" r="50"/>
                </svg>
                <div class="timer-text" id="timerText">10</div>
            </div>
            <div class="timer-label">等待时间</div>
        </div>
        
        <div class="footer">
            <span>异界之岛</span> · 旅行者指南
        </div>
        <div class="hint">尊重游戏资源，请合理访问</div>
    </div>
    
    <script>
        const TOTAL_TIME = 10;
        let seconds = TOTAL_TIME;
        const progressCircle = document.getElementById('progressCircle');
        const timerText = document.getElementById('timerText');
        const circumference = 2 * Math.PI * 50;
        
        progressCircle.style.strokeDasharray = circumference;
        progressCircle.style.strokeDashoffset = 0;
        
        function updateProgress() {
            const progress = seconds / TOTAL_TIME;
            const offset = circumference * (1 - progress);
            progressCircle.style.strokeDashoffset = offset;
            timerText.textContent = seconds;
        }
        
        updateProgress();
        
        const interval = setInterval(() => {
            seconds--;
            updateProgress();
            
            if (seconds <= 0) {
                clearInterval(interval);
                localStorage.setItem('waited', 'true');
                window.location.href = './';
            }
        }, 1000);
    </script>
</body>
</html>
